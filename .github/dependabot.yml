# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
# npm only — the repo has no GitHub Actions workflows, so a github-actions
# ecosystem entry would fail with dependency_file_not_found.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/token-sniper-bot"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/token-safety-bot"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/wallet-tracker-pro"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]
